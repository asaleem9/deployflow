name: Deploy to GCP

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.GCP_VM_IP }}
          username: root
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            cd /opt/deployflow
            git pull origin main
            docker compose build
            docker compose up -d
            docker image prune -f
