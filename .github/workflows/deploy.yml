#
# Build multi-arch images (ARM64 for Oracle Ampere + x86) and deploy to the VM.
# Triggered only by version tags — and because a tag push publishes the exact
# source being deployed to the public repo, this keeps AGPL section 13 satisfied:
# the running version always corresponds to available source.

name: Deploy

on:
  push:
    tags:
      - "v*"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - { name: api, context: ./apps/api, dockerfile: ./apps/api/Dockerfile.api }
          - { name: web, context: ., dockerfile: ./apps/web/Dockerfile.web }
          - { name: space, context: ., dockerfile: ./apps/space/Dockerfile.space }
          - { name: admin, context: ., dockerfile: ./apps/admin/Dockerfile.admin }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.service.name }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}/${{ matrix.service.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/deployflow
            git fetch --tags origin
            git checkout ${{ github.ref_name }}
            docker compose -f docker-compose.yml pull
            # the migrator one-shot runs migrations before api/workers start
            docker compose -f docker-compose.yml up -d
            docker image prune -f
